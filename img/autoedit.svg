<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16203010"/>
      <stop offset="0" stop-color="#172234"/>
      <stop offset="1" stop-color="#0a0e16"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f9cf9"/>
      <stop offset="1" stop-color="#2f80ff"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d6fff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#3d6fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bg)"/>
  <rect x="24.5" y="24.5" width="463" height="463" rx="107.5" fill="none" stroke="url(#edge)" stroke-width="2"/>

  <!-- Cut play mark: a play triangle sliced by a diagonal 'cut', two offset halves -->
  <g filter="url(#glow)">
    <!-- upper-left half of the triangle (nudged up-left) -->
    <path d="M 180 150 L 180 256 L 372 256 Z"
          transform="translate(-10,-10)" fill="url(#blue)"/>
    <!-- lower-right half of the triangle (nudged down-right) -->
    <path d="M 180 256 L 180 362 L 372 256 Z"
          transform="translate(10,10)" fill="url(#blue)"/>
  </g>

  <!-- waveform accent under the mark -->
  <g fill="#4f9cf9" opacity="0.9">
    <rect x="196" y="386" width="14" height="26" rx="7"/>
    <rect x="224" y="378" width="14" height="42" rx="7"/>
    <rect x="252" y="368" width="14" height="62" rx="7"/>
    <rect x="280" y="378" width="14" height="42" rx="7"/>
    <rect x="308" y="388" width="14" height="22" rx="7"/>
  </g>
</svg>
